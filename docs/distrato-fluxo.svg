<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1560" viewBox="0 0 1040 1560" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1040" height="1560" fill="#f8fafc"/>

  <!-- Title -->
  <text x="40" y="48" font-size="26" font-weight="700" fill="#0f172a">Fluxo de Distrato (rescisão amigável) — estado atual</text>
  <text x="40" y="74" font-size="14" fill="#475569">ERP Construtora · inclui a rastreabilidade da regra aplicada (Fase A / PR #18)</text>

  <!-- Legend -->
  <g font-size="12.5" fill="#334155">
    <rect x="40" y="92" width="16" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="62" y="105">Ação do usuário (frontend)</text>
    <rect x="250" y="92" width="16" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="272" y="105">Validação</text>
    <rect x="370" y="92" width="16" height="16" rx="3" fill="#d1fae5" stroke="#10b981"/>
    <text x="392" y="105">Processamento backend</text>
    <rect x="575" y="92" width="16" height="16" rx="3" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="597" y="105">Resultado / estado final</text>
    <rect x="800" y="92" width="16" height="16" rx="3" fill="#fee2e2" stroke="#dc2626"/>
    <text x="822" y="105">Novo (Fase A)</text>
  </g>

  <!-- 1. Venda ATIVA -->
  <g filter="url(#sh)">
    <rect x="400" y="135" width="240" height="56" rx="28" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  </g>
  <text x="520" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#0c4a6e">Venda ATIVA</text>
  <text x="520" y="179" text-anchor="middle" font-size="12" fill="#0369a1">contrato vigente · lote SOLD</text>
  <line x1="520" y1="191" x2="520" y2="222" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. User clica Distratar -->
  <g filter="url(#sh)">
    <rect x="360" y="226" width="320" height="58" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="520" y="250" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Usuário clica "Distratar venda"</text>
  <text x="520" y="270" text-anchor="middle" font-size="12" fill="#1d4ed8">SalesPage · abre o modal de distrato</text>
  <line x1="520" y1="284" x2="520" y2="314" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Modal de distrato -->
  <g filter="url(#sh)">
    <rect x="300" y="318" width="440" height="226" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="520" y="342" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Modal de distrato — preenchimento</text>
  <text x="520" y="361" text-anchor="middle" font-size="11.5" fill="#1d4ed8">pré-preenche data=hoje e devolução=valor pago</text>
  <g font-size="13" fill="#1e293b">
    <text x="324" y="388">• Data do distrato</text>
    <text x="324" y="410">• Valor a devolver</text>
    <text x="324" y="432">• Valor retido</text>
    <text x="324" y="454">• Motivo do distrato</text>
  </g>
  <!-- NEW fields highlight -->
  <rect x="324" y="466" width="392" height="64" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="334" y="486" font-size="11" font-weight="700" fill="#b91c1c">NOVO (Fase A) — rastreabilidade</text>
  <text x="334" y="506" font-size="13" fill="#1e293b">• Regra aplicada  <tspan fill="#b91c1c" font-weight="600">(obrigatória, com sugestões)</tspan></text>
  <text x="334" y="524" font-size="13" fill="#1e293b">• Memória de cálculo  <tspan fill="#64748b">(opcional)</tspan></text>

  <line x1="520" y1="544" x2="520" y2="576" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="566" font-size="12" font-weight="600" fill="#334155">POST /api/sales/{id}/distrato</text>

  <!-- 4. Validation 1 -->
  <g filter="url(#sh)">
    <polygon points="520,580 700,640 520,700 340,640" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="520" y="636" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Venda já está</text>
  <text x="520" y="654" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">CANCELADA?</text>
  <!-- erro path -->
  <line x1="700" y1="640" x2="800" y2="640" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="712" y="632" font-size="12" font-weight="700" fill="#dc2626">SIM</text>
  <rect x="800" y="612" width="208" height="56" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="904" y="635" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">Erro 400 — "já está</text>
  <text x="904" y="653" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">cancelada/distratada"</text>
  <line x1="520" y1="700" x2="520" y2="730" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="534" y="720" font-size="12" font-weight="700" fill="#166534">NÃO</text>

  <!-- 5. Validation 2 -->
  <g filter="url(#sh)">
    <polygon points="520,734 712,800 520,866 328,800" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="520" y="792" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Devolução + Retido</text>
  <text x="520" y="810" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">&gt; Valor vendido?</text>
  <line x1="712" y1="800" x2="800" y2="800" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="722" y="792" font-size="12" font-weight="700" fill="#dc2626">SIM</text>
  <rect x="800" y="772" width="208" height="56" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="904" y="795" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">Erro 400 — "não pode</text>
  <text x="904" y="813" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">exceder valor vendido"</text>
  <line x1="520" y1="866" x2="520" y2="898" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="534" y="888" font-size="12" font-weight="700" fill="#166534">NÃO</text>

  <!-- 6. Backend processing -->
  <g filter="url(#sh)">
    <rect x="280" y="902" width="480" height="232" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.8"/>
  </g>
  <text x="520" y="928" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">SaleService.distrato()  ·  @Auditable(SALE_DISTRATO)</text>
  <line x1="300" y1="940" x2="740" y2="940" stroke="#10b981" stroke-width="1" stroke-dasharray="3 3"/>
  <g font-size="13" fill="#064e3b">
    <text x="304" y="966">1 · sale.status → <tspan font-weight="700">CANCELLED</tspan>  (preserva no histórico)</text>
    <text x="304" y="990">2 · grava distratoDate · reason · refund · retained</text>
    <text x="304" y="1014" fill="#b91c1c" font-weight="700">3 · grava REGRA + MEMÓRIA DE CÁLCULO  (Fase A)</text>
    <text x="304" y="1038">4 · libera o lote → status <tspan font-weight="700">AVAILABLE</tspan>, saleValue = null</text>
    <text x="304" y="1062">5 · registra log de auditoria (quem / quando)</text>
    <text x="304" y="1086">6 · retorna SaleResponse (com regra + memória)</text>
  </g>
  <text x="520" y="1116" text-anchor="middle" font-size="11.5" fill="#047857">Obs.: diferente de EXCLUIR — o distrato mantém a venda para auditoria</text>

  <!-- arrows to outcomes -->
  <line x1="520" y1="1134" x2="520" y2="1162" stroke="#475569" stroke-width="2"/>
  <line x1="200" y1="1162" x2="840" y2="1162" stroke="#475569" stroke-width="2"/>
  <line x1="200" y1="1162" x2="200" y2="1192" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="1162" x2="520" y2="1192" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="840" y1="1162" x2="840" y2="1192" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. Outcomes -->
  <g filter="url(#sh)">
    <rect x="80" y="1196" width="240" height="84" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="200" y="1224" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Venda CANCELADA</text>
  <text x="200" y="1246" text-anchor="middle" font-size="12" fill="#6d28d9">mantida no histórico</text>
  <text x="200" y="1264" text-anchor="middle" font-size="12" fill="#6d28d9">com regra rastreável</text>

  <g filter="url(#sh)">
    <rect x="400" y="1196" width="240" height="84" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="520" y="1224" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Lote AVAILABLE</text>
  <text x="520" y="1246" text-anchor="middle" font-size="12" fill="#6d28d9">liberado para nova</text>
  <text x="520" y="1264" text-anchor="middle" font-size="12" fill="#6d28d9">comercialização</text>

  <g filter="url(#sh)">
    <rect x="720" y="1196" width="240" height="84" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="840" y="1224" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Auditoria registrada</text>
  <text x="840" y="1246" text-anchor="middle" font-size="12" fill="#6d28d9">SALE_DISTRATO</text>
  <text x="840" y="1264" text-anchor="middle" font-size="12" fill="#6d28d9">usuário + timestamp</text>

  <!-- 8. Document generation -->
  <line x1="200" y1="1280" x2="200" y2="1330" stroke="#475569" stroke-width="2"/>
  <line x1="200" y1="1330" x2="300" y2="1330" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="304" y="1300" width="456" height="96" rx="12" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  </g>
  <text x="532" y="1326" text-anchor="middle" font-size="14" font-weight="700" fill="#0c4a6e">Geração do documento de distrato (opcional)</text>
  <text x="532" y="1348" text-anchor="middle" font-size="12" fill="#0369a1">GET /api/sales/{id}/distrato/pdf · template DISTRATO</text>
  <text x="532" y="1368" text-anchor="middle" font-size="12" fill="#0369a1">ContractRenderer injeta {{distrato_regra}} e {{distrato_regra_detalhe}}</text>
  <text x="532" y="1386" text-anchor="middle" font-size="11.5" fill="#0284c7">→ PDF arquivado como ContractDocument (type = DISTRATO)</text>

  <!-- 9. View detail -->
  <line x1="520" y1="1280" x2="520" y2="1300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="120" y="1430" width="800" height="96" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="520" y="1456" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Detalhe da venda distratada (visualização)</text>
  <text x="520" y="1478" text-anchor="middle" font-size="12.5" fill="#b45309">Bloco "Distrato em {data}" · Devolvido · Retido · Motivo</text>
  <text x="520" y="1500" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">Regra aplicada + Memória de cálculo exibidas (rastreabilidade Fase A)</text>
  <line x1="532" y1="1396" x2="532" y2="1424" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
