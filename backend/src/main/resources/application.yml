spring:
  application:
    name: construtora-financeiro

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/construtora}
    username: ${SPRING_DATASOURCE_USERNAME:construtora}
    password: ${SPRING_DATASOURCE_PASSWORD:construtora}

  jpa:
    hibernate:
      ddl-auto: validate          # Schema controlado pelo Flyway, nunca pelo Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Sao_Paulo
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ---- Configuracoes da aplicacao ----
app:
  jwt:
    secret: ${JWT_SECRET:troque-este-segredo-por-um-valor-aleatorio-bem-grande-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@construtora.com.br}
    password: ${APP_ADMIN_PASSWORD:Admin@123}
  mail:
    from: ${MAIL_FROM:nao-responder@construtora.com.br}
    enabled: ${MAIL_ENABLED:false}      # No POC fica desligado por padrao; loga em vez de enviar
  storage:
    upload-dir: ${APP_UPLOAD_DIR:./uploads}
  license:
    # Segredo para assinar/validar a chave de licenciamento (HMAC-SHA256). Em
    # produção, defina LICENSE_SECRET por VM (ou o mesmo segredo no painel da Fase 5).
    secret: ${LICENSE_SECRET:troque-este-segredo-de-licenca-por-um-valor-aleatorio-256-bits}

# ---- Documentacao ----
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.construtora.financeiro: DEBUG
    org.flywaydb: INFO
    # Spring Data 3.3+ emite WARN ao serializar PageImpl diretamente.
    # Não afeta funcionamento — a estrutura JSON (content/totalElements/...)
    # continua estável. Silenciamos até migrar para VIA_DTO (TODO).
    org.springframework.data.web.config: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
