# Perfil de testes de integração (Testcontainers).
# O @ServiceConnection do AbstractIntegrationTest injeta a URL do PostgreSQL real,
# sobrescrevendo qualquer datasource configurado aqui.
# Desabilitar o seed do admin inicial para não conflitar com testes.
app.admin.email=test@test.com
app.admin.password=Test@1234
app.jwt.secret=integration-test-secret-must-be-at-least-256-bits-long-for-hmac-sha
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:5173
app.license.secret=integration-test-license-secret-at-least-256-bits-for-hmac-sha256
