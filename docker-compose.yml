# ============================================================
#  Ambiente local completo: PostgreSQL + Backend + Frontend
#  Uso: docker compose up --build
# ============================================================
services:
  db:
    image: postgres:16-alpine
    container_name: construtora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-construtora}
      POSTGRES_USER: ${POSTGRES_USER:-construtora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-construtora}
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-construtora}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construtora-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-construtora}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-construtora}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-construtora}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-por-um-valor-aleatorio-bem-grande-256-bits}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@construtora.com.br}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-Admin@123}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-nao-responder@construtora.com.br}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: construtora-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
