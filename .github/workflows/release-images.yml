name: Release images

# Builda e publica as imagens Docker (backend + frontend) no GitHub Container
# Registry (GHCR). A imagem é construída UMA vez aqui; cada VM de cliente apenas
# faz `docker compose pull` da MESMA imagem (ver docs/DEPLOY.md secao 9).
#
# Tags geradas:
#   - latest        (em todo push na main)
#   - sha-<curto>   (rastreabilidade de cada commit)
#   - vX.Y.Z        (quando um tag de versao e empurrado: release pinada)
#
# O frontend e buildado com VITE_API_BASE_URL=/api (relativo): como o Caddy serve
# frontend e backend no MESMO dominio, a MESMA imagem de frontend serve TODOS os
# clientes, independente do dominio de cada um.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build & push (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            build_args: ''
          - name: frontend
            context: ./frontend
            build_args: |
              VITE_API_BASE_URL=/api
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erp-construtora-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
